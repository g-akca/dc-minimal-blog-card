<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <title>Minimal Blog Card</title>
  </head>
  <body>
    <main class="card">
      <div class="card-main">
        <img src="resources/Cactus.jpg" alt="Cactus on a purple background">
        <span class="badge">Design</span>

        <div class="card-details">
          <h2>Embracing Minimalism</h2>
          <p>From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>
        </div>
      </div>
      <div class="card-author">
        <p>Annie Spratt</p>
      </div>
    </main>
  </body>
</html>
